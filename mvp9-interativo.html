<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respira · Módulo 9</title>
<meta name="theme-color" content="#F4EFE4">
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4EFE4;color:#16383B;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px;text-align:center}a{color:#A24B2C;font-weight:700}
</style>
</head>
<body>
<main>
<p>Carregando Módulo 9 com trilha refinada…</p>
<p><a href="mvp9.html">Abrir versão base</a></p>
</main>
<script>
(function(){
  const SRC='mvp9.html';
  fetch(SRC,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}).then(html=>{
    const patch='<script src="respira-quiz-refiner.js" data-module="m9"><\\/script>';
    const tokens=['let idx=0, correct=0, answered=false;','let idx=0,correct=0,answered=false;'];
    let injected=false;
    for(const token of tokens){if(html.includes(token)){html=html.replace(token,patch+'\n'+token);injected=true;break;}}
    if(!injected)console.warn('Respira: ponto de injeção do refinador não encontrado em '+SRC);
    document.open();document.write(html);document.close();
  }).catch(err=>{document.body.innerHTML='<main><p>Falha ao carregar o módulo refinado.</p><p><a href="'+SRC+'">Abrir versão base</a></p><pre style="white-space:pre-wrap;text-align:left;max-width:680px">'+String(err)+'</pre></main>';});
})();
</script>
</body>
</html>
