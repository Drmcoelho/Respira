<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respira · Módulo 9</title>
<meta name="theme-color" content="#F4EFE4">
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4EFE4;color:#16383B;display:grid;place-items:center;min-height:100vh;margin:0;padding:24px;text-align:center}a{color:#A24B2C;font-weight:700}
</style>
</head>
<body>
<main>
<p>Carregando Módulo 9 com alternativas balanceadas…</p>
<p><a href="mvp9.html">Abrir versão base</a></p>
</main>
<script>
(function(){
  const SRC='mvp9.html';
  const antiBias = `
(function balanceRespiraQuestions(){
  if(typeof QUESTIONS==='undefined' || !Array.isArray(QUESTIONS) || window.__respiraBalanced) return;
  window.__respiraBalanced = true;
  const targets = [2,0,3,1,1,3,0,2,0,2,1,3,2,1,0,3];
  const neutral = [
    ' — como hipótese operacional do mesmo eixo',
    ' — como leitura inicial da variável medida',
    ' — dentro do mapa fisiológico do caso',
    ' — se esse fosse o mecanismo dominante',
    ' — na lógica de beira-leito'
  ];
  const plain = s => String(s).replace(/<[^>]*>/g,'').replace(/&[^;]+;/g,'x').replace(/\s+/g,' ').trim();
  QUESTIONS.forEach((q, qi)=>{
    if(!q || !Array.isArray(q.opts) || q.opts.length !== 4) return;
    const oldAnswer = Number(q.answer);
    if(!Number.isInteger(oldAnswer) || oldAnswer < 0 || oldAnswer > 3) return;
    let opts = q.opts.map(o => String(o));
    const correctLen = plain(opts[oldAnswer]).length;
    const targetLen = Math.min(240, Math.max(92, correctLen + 8));
    opts = opts.map((o, oi)=>{
      let t = o, guard = 0;
      while(plain(t).length < targetLen && guard < 5){
        t += neutral[(qi + oi + guard) % neutral.length];
        guard++;
      }
      return t;
    });
    const target = targets[qi % targets.length];
    const ordered = new Array(4);
    ordered[target] = opts[oldAnswer];
    const wrongs = opts.map((o,i)=>({o,i})).filter(x=>x.i !== oldAnswer);
    const shift = qi % wrongs.length;
    const rotated = wrongs.slice(shift).concat(wrongs.slice(0, shift));
    let wi = 0;
    for(let pos=0; pos<4; pos++) if(pos !== target) ordered[pos] = rotated[wi++].o;
    q.opts = ordered;
    q.answer = target;
  });
})();
`;
  fetch(SRC, {cache:'no-store'}).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); }).then(html=>{
    const patch = '<script>'+antiBias+'<\\/script>';
    const tokens = ['let idx=0, correct=0, answered=false;', 'let idx=0,correct=0,answered=false;'];
    let injected = false;
    for(const token of tokens){
      if(html.includes(token)){ html = html.replace(token, patch+'\n'+token); injected = true; break; }
    }
    if(!injected) console.warn('Respira: ponto de injeção do antiviés não encontrado em '+SRC);
    document.open(); document.write(html); document.close();
  }).catch(err=>{
    document.body.innerHTML = '<main><p>Falha ao carregar o módulo balanceado.</p><p><a href="'+SRC+'">Abrir versão base</a></p><pre style="white-space:pre-wrap;text-align:left;max-width:680px">'+String(err)+'</pre></main>';
  });
})();
</script>
</body>
</html>
