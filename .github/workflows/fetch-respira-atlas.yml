name: Fetch Respira open atlas

on:
  push:
    branches: [main]
    paths:
      - scripts/fetch_respira_atlas.py
      - .github/workflows/fetch-respira-atlas.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-respira-open-atlas
  cancel-in-progress: true

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download and validate 40 open-media assets
        run: python scripts/fetch_respira_atlas.py --all
      - name: Commit validated atlas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/respira-ventila-atlas
          git diff --cached --quiet && exit 0
          git commit -m "assets: archive Respira and Ventila open atlas"
          git push
